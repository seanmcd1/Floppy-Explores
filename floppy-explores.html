// === Music System ===
let musicStarted = false;
let synth = null;
let bassSynth = null;
let melodyLoop = null;
let bassLoop = null;

const MELODY_BY_BIOME = [
  ["C5","E5","G5","A5","G5","E5","D5","C5","E5","G5","A5","B5","A5","G5","E5","D5"],
  ["A4","C5","E5","A5","G5","E5","C5","A4","D5","F5","A5","G5","F5","D5","C5","A4"],
  ["E5","G5","B5","E6","D6","B5","A5","G5","E5","G5","A5","B5","D6","B5","G5","E5"],
  ["D5","F5","A5","D6","C6","A5","F5","D5","G5","Bb5","D6","C6","Bb5","G5","F5","D5"],
  ["A4","C5","D5","E5","G5","E5","D5","C5","A4","G4","A4","C5","D5","E5","D5","C5"],
];

const BASS_BY_BIOME = [
  ["C3","C3","G3","G3","A3","A3","F3","F3"],
  ["A2","A2","F3","F3","D3","D3","E3","E3"],
  ["E3","E3","G3","G3","A3","A3","B3","B3"],
  ["D3","D3","F3","F3","G3","G3","Bb3","Bb3"],
  ["A2","A2","C3","C3","D3","D3","E3","E3"],
];

function initMusic() {
  if (musicStarted) return;
  musicStarted = true;
  synth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "triangle" },
    envelope: { attack: 0.05, decay: 0.3, sustain: 0.2, release: 0.8 },
    volume: -14,
  }).toDestination();
  bassSynth = new Tone.Synth({
    oscillator: { type: "sine" },
    envelope: { attack: 0.1, decay: 0.4, sustain: 0.6, release: 1.0 },
    volume: -18,
  }).toDestination();
}

function startBiomeMusic(idx) {
  if (!musicStarted) return;
  stopMusic();
  const melody = MELODY_BY_BIOME[idx] || MELODY_BY_BIOME[0];
  const bass = BASS_BY_BIOME[idx] || BASS_BY_BIOME[0];
  Tone.getTransport().bpm.value = [100, 90, 110, 95, 80][idx] || 100;
  let mi = 0;
  melodyLoop = new Tone.Loop((time) => {
    synth.triggerAttackRelease(melody[mi % melody.length], "8n", time);
    mi++;
  }, "4n").start(0);
  let bi = 0;
  bassLoop = new Tone.Loop((time) => {
    bassSynth.triggerAttackRelease(bass[bi % bass.length], "2n", time);
    bi++;
  }, "2n").start(0);
  Tone.getTransport().start();
}

function startHubMusic() {
  if (!musicStarted) return;
  stopMusic();
  const hm = ["C5","E5","G5","C6","B5","G5","E5","C5","D5","F5","A5","D6","C6","A5","F5","D5"];
  const hb = ["C3","C3","G3","G3","F3","F3","G3","G3"];
  Tone.getTransport().bpm.value = 88;
  let mi = 0;
  melodyLoop = new Tone.Loop((time) => { synth.triggerAttackRelease(hm[mi % hm.length], "8n", time); mi++; }, "4n").start(0);
  let bi = 0;
  bassLoop = new Tone.Loop((time) => { bassSynth.triggerAttackRelease(hb[bi % hb.length], "2n", time); bi++; }, "2n").start(0);
  Tone.getTransport().start();
}

function stopMusic() {
  Tone.getTransport().stop();
  if (melodyLoop) { melodyLoop.stop(); melodyLoop.dispose(); melodyLoop = null; }
  if (bassLoop) { bassLoop.stop(); bassLoop.dispose(); bassLoop = null; }
}

function playSFX(type) {
  if (!musicStarted) return;
  const s = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }, volume: -10 }).toDestination();
  if (type === "carrot") s.triggerAttackRelease("E6", "16n");
  else if (type === "golden") { s.triggerAttackRelease("C6", "8n"); setTimeout(() => s.triggerAttackRelease("E6", "8n"), 100); setTimeout(() => s.triggerAttackRelease("G6", "8n"), 200); }
  else if (type === "jump") { s.volume.value = -16; s.triggerAttackRelease("C5", "32n"); }
  else if (type === "flap") { s.volume.value = -16; s.oscillator.type = "triangle"; s.triggerAttackRelease("E5", "16n"); }
  else if (type === "hurt") { s.oscillator.type = "sawtooth"; s.volume.value = -12; s.triggerAttackRelease("C3", "8n"); }
  else if (type === "build") { s.triggerAttackRelease("G5", "8n"); setTimeout(() => s.triggerAttackRelease("B5", "8n"), 120); setTimeout(() => s.triggerAttackRelease("D6", "4n"), 240); }
  else if (type === "snap") { s.volume.value = -8; s.triggerAttackRelease("A5", "32n"); }
  else if (type === "material") { s.oscillator.type = "triangle"; s.triggerAttackRelease("D5", "16n"); }
  setTimeout(() => s.dispose(), 1000);
}

// === Level Generation ===
function generateLevel(biomeIdx) {
  const biome = BIOMES[biomeIdx];
  const width = 60 + biomeIdx * 10;
  const height = 20;
  const tiles = [];
  const carrots = [];
  const trees = [];
  const hazards = [];
  const materials = [];
  const furnitureDrops = [];

  for (let x = 0; x < width; x++)
    for (let y = 0; y < height; y++)
      tiles.push({ x, y, solid: false });

  const getSolid = (x, y) => tiles.find(t => t.x === x && t.y === y);
  const groundY = height - 3;

  for (let x = 0; x < width; x++)
    for (let y = groundY; y < height; y++) { const t = getSolid(x, y); if (t) t.solid = true; }

  for (let i = 0; i < 8 + biomeIdx * 4; i++) {
    const px = 5 + Math.floor(Math.random() * (width - 10));
    const py = groundY - 3 - Math.floor(Math.random() * 8);
    for (let x = px; x < px + 2 + Math.floor(Math.random() * 4) && x < width; x++) { const t = getSolid(x, py); if (t) t.solid = true; }
  }

  if (biomeIdx > 0)
    for (let i = 0; i < 1 + biomeIdx; i++) {
      const gx = 8 + Math.floor(Math.random() * (width - 16));
      for (let x = gx; x < gx + 2 + Math.floor(Math.random() * 2); x++)
        for (let y = groundY; y < height; y++) { const t = getSolid(x, y); if (t) t.solid = false; }
    }

  for (let i = 0; i < 5 + biomeIdx * 2; i++) {
    const tx = 3 + Math.floor(Math.random() * (width - 6));
    const th = 5 + Math.floor(Math.random() * 4);
    const gt = getSolid(tx, groundY);
    if (gt && gt.solid) trees.push({ x: tx, baseY: groundY, height: th });
  }

  for (let i = 0; i < 15 + biomeIdx * 5; i++) {
    for (let attempt = 0; attempt < 20; attempt++) {
      const cx = 2 + Math.floor(Math.random() * (width - 4));
      const cy = 2 + Math.floor(Math.random() * (groundY - 3));
      const t = getSolid(cx, cy);
      if (!t || !t.solid) { carrots.push({ x: cx * TILE + TILE / 2, y: cy * TILE + TILE / 2, collected: false, golden: i === 0 }); break; }
    }
  }

  const matTypes = ["wood", "vine", "cloth", "leaf"];
  for (let i = 0; i < 3 + biomeIdx * 2; i++) {
    for (let attempt = 0; attempt < 20; attempt++) {
      const mx = 3 + Math.floor(Math.random() * (width - 6));
      const my = groundY - 1 - Math.floor(Math.random() * 6);
      const t = getSolid(mx, my);
      if (!t || !t.solid) { materials.push({ x: mx * TILE + TILE / 2, y: my * TILE + TILE / 2, type: matTypes[Math.floor(Math.random() * matTypes.length)], collected: false }); break; }
    }
  }

  const avail = FURNITURE_ITEMS.filter(f => biomeIdx < 2 ? f.rarity === "common" : biomeIdx < 4 ? f.rarity !== "legendary" : true);
  for (let i = 0; i < 1 + Math.floor(Math.random() * 2); i++) {
    const fi = avail[Math.floor(Math.random() * avail.length)];
    for (let attempt = 0; attempt < 20; attempt++) {
      const fx = 8 + Math.floor(Math.random() * (width - 16));
      const fy = groundY - 2 - Math.floor(Math.random() * 6);
      const t = getSolid(fx, fy);
      if (!t || !t.solid) { furnitureDrops.push({ ...fi, x: fx * TILE + TILE / 2, y: fy * TILE + TILE / 2, collected: false }); break; }
    }
  }

  if (biomeIdx >= 1)
    for (let i = 0; i < biomeIdx * 2; i++) {
      const hx = 6 + Math.floor(Math.random() * (width - 12));
      hazards.push({ x: hx * TILE, y: (groundY - 1) * TILE, type: biomeIdx >= 3 ? "water" : "thorn" });
    }

  return { tiles, carrots, trees, hazards, materials, furnitureDrops, width, height, groundY, biome, biomeIdx, exitX: (width - 3) * TILE, exitY: (groundY - 2) * TILE };
}

// === Drawing ===
function drawBunny(ctx, x, y, facing, frame, climbing, jumping, outfit) {
  ctx.save();
  ctx.translate(x, y);
  if (facing < 0) ctx.scale(-1, 1);
  const b = climbing ? 0 : Math.sin(frame * 0.15) * 2;
  const ew = Math.sin(frame * 0.1) * 3;

  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.beginPath(); ctx.ellipse(0, 16, 10, 4, 0, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = outfit.body;
  ctx.beginPath(); ctx.ellipse(0, 4 + b, 12, 14, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.lineWidth = 1.5; ctx.stroke();

  if (outfit.accessory === "apron") { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(0, 8 + b, 9, 10, 0, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = "#ccc"; ctx.lineWidth = 1; ctx.stroke(); }

  ctx.fillStyle = outfit.belly;
  ctx.beginPath(); ctx.ellipse(0, 8 + b, 8, 9, 0, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = outfit.body;
  ctx.beginPath(); ctx.ellipse(0, -12 + b, 10, 10, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.lineWidth = 1.5; ctx.stroke();

  const drawEar = (ex, ey, ang) => {
    ctx.fillStyle = outfit.body; ctx.beginPath(); ctx.ellipse(ex, ey + b, 4, 10, ang, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.stroke();
    ctx.fillStyle = outfit.ears; ctx.beginPath(); ctx.ellipse(ex, ey + b, 2, 7, ang, 0, Math.PI * 2); ctx.fill();
  };
  drawEar(-4 - ew, -28, -0.15);
  drawEar(4 + ew, -30, 0.15);

  if (outfit.hat === "mohawk") { ctx.fillStyle = "#ff2266"; for (let i = 0; i < 5; i++) { ctx.beginPath(); ctx.ellipse(-1 + i * 1.5, -34 + b - i, 2, 5 + i, 0, 0, Math.PI * 2); ctx.fill(); } }
  if (outfit.hat === "headband") { ctx.fillStyle = "#cc2222"; ctx.fillRect(-12, -16 + b, 24, 3); ctx.beginPath(); ctx.moveTo(10, -16 + b); ctx.lineTo(16, -20 + b); ctx.lineTo(14, -14 + b); ctx.fill(); }
  if (outfit.hat === "safari") { ctx.fillStyle = "#c4a46c"; ctx.beginPath(); ctx.ellipse(0, -20 + b, 14, 4, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = "#b8954a"; ctx.beginPath(); ctx.ellipse(0, -23 + b, 8, 5, 0, 0, Math.PI * 2); ctx.fill(); }
  if (outfit.hat === "pirate") { ctx.fillStyle = "#222"; ctx.beginPath(); ctx.moveTo(-12, -18 + b); ctx.lineTo(0, -32 + b); ctx.lineTo(12, -18 + b); ctx.closePath(); ctx.fill(); ctx.fillStyle = "#fff"; ctx.font = "8px sans-serif"; ctx.textAlign = "center"; ctx.fillText("\u2620", 0, -21 + b); }
  if (outfit.hat === "helmet") { ctx.fillStyle = "#888"; ctx.beginPath(); ctx.arc(0, -16 + b, 12, Math.PI, 0); ctx.fill(); ctx.fillStyle = "#666"; ctx.fillRect(-12, -16 + b, 24, 3); ctx.fillStyle = "#aaa"; ctx.beginPath(); ctx.ellipse(0, -26 + b, 3, 6, 0, 0, Math.PI * 2); ctx.fill(); }
  if (outfit.hat === "wizard") { ctx.fillStyle = "#6633aa"; ctx.beginPath(); ctx.moveTo(-10, -18 + b); ctx.lineTo(0, -40 + b); ctx.lineTo(10, -18 + b); ctx.closePath(); ctx.fill(); ctx.fillStyle = "#ffdd44"; ctx.font = "7px sans-serif"; ctx.textAlign = "center"; ctx.fillText("\u2605", 0, -24 + b); ctx.fillStyle = "#6633aa"; ctx.beginPath(); ctx.ellipse(0, -18 + b, 12, 3, 0, 0, Math.PI * 2); ctx.fill(); }
  if (outfit.hat === "chef") { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, -24 + b, 10, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(-5, -22 + b, 6, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(5, -22 + b, 6, 0, Math.PI * 2); ctx.fill(); ctx.fillRect(-8, -18 + b, 16, 4); }

  if (outfit.accessory === "eyepatch") {
    ctx.fillStyle = "#2a1a0a"; ctx.beginPath(); ctx.ellipse(-4, -14 + b, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(-3, -15 + b, 1, 1.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#222"; ctx.fillRect(1, -17 + b, 8, 7);
    ctx.strokeStyle = "#333"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(5, -14 + b); ctx.lineTo(10, -22 + b); ctx.stroke();
  } else {
    ctx.fillStyle = "#2a1a0a"; ctx.beginPath(); ctx.ellipse(-4, -14 + b, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(-3, -15 + b, 1, 1.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#2a1a0a"; ctx.beginPath(); ctx.ellipse(4, -14 + b, 2.5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(5, -15 + b, 1, 1.2, 0, 0, Math.PI * 2); ctx.fill();
  }

  ctx.fillStyle = "#ffaaaa"; ctx.beginPath(); ctx.ellipse(0, -10 + b, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#c8a0a0"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(-2, -8 + b, 2, 0, Math.PI * 0.8); ctx.stroke();
  ctx.beginPath(); ctx.arc(2, -8 + b, 2, Math.PI * 0.2, Math.PI); ctx.stroke();
  ctx.fillStyle = "rgba(255,180,180,0.3)";
  ctx.beginPath(); ctx.ellipse(-8, -10 + b, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8, -10 + b, 3, 2, 0, 0, Math.PI * 2); ctx.fill();

  if (outfit.accessory === "wand") { ctx.strokeStyle = "#8B6914"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(10, -2 + b); ctx.lineTo(18, -14 + b); ctx.stroke(); ctx.fillStyle = "#ffdd44"; ctx.font = "10px sans-serif"; ctx.fillText("\u2726", 16, -14 + b); }

  if (!climbing) {
    const fa = Math.sin(frame * 0.2) * 3;
    ctx.fillStyle = outfit.body === "#2a2a2a" ? "#1a1a1a" : "#f0e8e0";
    ctx.beginPath(); ctx.ellipse(-5 + fa, 16, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5 - fa, 16, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
  }

  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(-10, 6 + b, 5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawCarrot(ctx, x, y, golden, frame) {
  ctx.save(); ctx.translate(x, y);
  const bob = Math.sin(frame * 0.08 + x * 0.1) * 3;

// === LEGO BUILD MINIGAME ===
function LegoBuild({ houseLevel, collectedFurniture, placedFurniture, setPlacedFurniture, onBack }) {
  const canvasRef = useRef(null);
  const [pieces, setPieces] = useState([]);
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOff, setDragOff] = useState({ x: 0, y: 0 });
  const [placed, setPlaced] = useState([]);
  const [selFurn, setSelFurn] = useState(null);
  const [done, setDone] = useState(false);
  const G = 32;

  useEffect(() => {
    const all = [];
    const stages = ["foundation", "walls", "roof"];
    if (houseLevel >= 2) stages.push("cottage");
    if (houseLevel >= 5) stages.push("treehouse");
    // Layout pieces in a tray grid below the build area
    const TRAY_TOP = 360;
    const TRAY_LEFT = 10;
    const TRAY_WIDTH = 450;
    const ROW_H = G + 12;
    let curX = TRAY_LEFT;
    let curY = TRAY_TOP;
    stages.forEach(stage => {
      (LEGO_PIECES[stage] || []).forEach((p, i) => {
        const pw = p.w * G;
        // Wrap to next row if this piece won't fit
        if (curX + pw > TRAY_LEFT + TRAY_WIDTH) {
          curX = TRAY_LEFT;
          curY += ROW_H;
        }
        all.push({ ...p, id: `${stage}-${i}`, targetX: p.x * G + 2.5 * G, targetY: p.y * G + G * 1.5, currentX: curX, currentY: curY, snapped: false });
        curX += pw + 10;
      });
    });
    setPieces(all);
    setPlaced(placedFurniture.map(f => ({ ...f })));
  }, [houseLevel, placedFurniture]);

  const getPos = (e) => {
    const r = canvasRef.current.getBoundingClientRect();
    return { x: (e.clientX - r.left) * (canvasRef.current.width / r.width), y: (e.clientY - r.top) * (canvasRef.current.height / r.height) };
  };

  const onDown = (e) => {
    const { x: mx, y: my } = getPos(e);
    if (selFurn !== null) {
      const fi = collectedFurniture[selFurn];
      setPlaced(p => [...p, { ...fi, gx: Math.round((mx - G) / G), gy: Math.round((my - G) / G) }]);
      setPlacedFurniture(p => [...p, { ...fi, gx: Math.round((mx - G) / G), gy: Math.round((my - G) / G) }]);
      setSelFurn(null); playSFX("snap"); return;
    }
    for (let i = pieces.length - 1; i >= 0; i--) {
      const p = pieces[i]; if (p.snapped) continue;
      if (mx >= p.currentX && mx <= p.currentX + p.w * G && my >= p.currentY && my <= p.currentY + p.h * G) {
        setDragIdx(i); setDragOff({ x: mx - p.currentX, y: my - p.currentY }); return;
      }
    }
  };

  const onMove = (e) => {
    if (dragIdx === null) return;
    const { x: mx, y: my } = getPos(e);
    setPieces(p => { const n = [...p]; n[dragIdx] = { ...n[dragIdx], currentX: mx - dragOff.x, currentY: my - dragOff.y }; return n; });
  };

  const onUp = () => {
    if (dragIdx === null) return;
    setPieces(p => {
      const n = [...p]; const pc = n[dragIdx];
      if (Math.hypot(pc.currentX - pc.targetX, pc.currentY - pc.targetY) < G * 1.5) {
        n[dragIdx] = { ...pc, currentX: pc.targetX, currentY: pc.targetY, snapped: true };
        playSFX("snap");
        setTimeout(() => { if (n.every(pp => pp.snapped)) setDone(true); }, 200);
      }
      return n;
    });
    setDragIdx(null);
  };

  useEffect(() => {
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext("2d");
    let raf, frame = 0;
    const draw = () => {
      frame++;
      const W = c.width, H = c.height;
      const gr = ctx.createLinearGradient(0, 0, 0, H); gr.addColorStop(0, "#f8f0e0"); gr.addColorStop(1, "#e8d8c0");
      ctx.fillStyle = gr; ctx.fillRect(0, 0, W, H);

      // Build area outline
      ctx.strokeStyle = "rgba(0,0,0,0.08)"; ctx.lineWidth = 1;
      ctx.strokeRect(G * 2.5, G * 1.5, G * 8, G * 9);

      // Ghost targets
      for (const p of pieces) { if (p.snapped) continue; ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.setLineDash([4, 4]); ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.roundRect(p.targetX, p.targetY, p.w * G, p.h * G, 3); ctx.fill(); ctx.stroke(); ctx.setLineDash([]); }

      // Placed furniture
      for (const f of placed) { ctx.font = `${Math.min(f.w, f.h) * G * 0.6}px serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(f.emoji, f.gx * G + G * 2.5 + (f.w * G) / 2, f.gy * G + G * 1.5 + (f.h * G) / 2); }

      // Pieces
      for (const p of pieces) {
        const x = p.currentX, y = p.currentY, w = p.w * G, h = p.h * G;
        // Shadow
        if (!p.snapped) { ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.beginPath(); ctx.roundRect(x + 3, y + 3, w, h, 4); ctx.fill(); }
        // Body
        ctx.fillStyle = p.color; ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(x, y, w, h, 4); ctx.fill(); ctx.stroke();
        // Studs
        ctx.fillStyle = "rgba(255,255,255,0.25)";
        for (let sx = 0; sx < p.w; sx++) for (let sy = 0; sy < p.h; sy++) { ctx.beginPath(); ctx.arc(x + sx * G + G / 2, y + sy * G + G / 2, 5, 0, Math.PI * 2); ctx.fill(); }
        // Highlight
        ctx.fillStyle = "rgba(255,255,255,0.12)"; ctx.fillRect(x + 2, y + 2, w - 4, h / 3);
        // Snap glow
        if (p.snapped) { ctx.strokeStyle = "rgba(100,255,100,0.4)"; ctx.lineWidth = 3; ctx.strokeRect(x - 1, y - 1, w + 2, h + 2); }
        // Label
        ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.font = "bold 8px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(p.type, x + w / 2, y + h / 2);
      }

      // Tray separator
      ctx.strokeStyle = "rgba(0,0,0,0.12)"; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.moveTo(8, 350); ctx.lineTo(W - 8, 350); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "left";
      ctx.fillText("\u{1F9F1} PIECES TRAY \u2014 drag to build area above", 12, 346);

      // Tray label
      ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("Drag Lego bricks to the outlined positions above!", W / 2, H - 10);
      if (selFurn !== null) { ctx.fillStyle = "#8844cc"; ctx.fillText(`Click grid to place ${collectedFurniture[selFurn].name}`, W / 2, H - 26); }
      if (done) {
        ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.fillRect(0, H / 2 - 30, W, 60);
        ctx.fillStyle = "#44aa44"; ctx.font = "bold 22px 'Fredoka',sans-serif"; ctx.fillText("\u{1F389} House Complete!", W / 2, H / 2 + 6);
      }
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(raf);
  }, [pieces, placed, selFurn, done, collectedFurniture]);

  return (
    <div style={{ width: "100%", height: "100vh", display: "flex", flexDirection: "column", background: "linear-gradient(180deg,#fff0e0,#ffe0c0)", fontFamily: "'Fredoka','Nunito',sans-serif", overflow: "hidden" }}>
      <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
      <div style={{ padding: "8px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
        <h2 style={{ margin: 0, color: "#884422", fontSize: 18 }}>{"\u{1F9F1}"} Build Floppy's Home</h2>
        <button onClick={onBack} style={{ padding: "4px 12px", fontSize: 12, fontWeight: 600, fontFamily: "inherit", background: "#fff", border: "2px solid #ddd", borderRadius: 12, cursor: "pointer" }}>{"\u2190"} Back</button>
      </div>
      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        <canvas ref={canvasRef} width={480} height={560} style={{ flex: 1, cursor: dragIdx !== null ? "grabbing" : "grab", touchAction: "none" }}
          onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp} />
        <div style={{ width: 140, background: "rgba(255,255,255,0.8)", padding: 8, overflow: "auto", borderLeft: "2px solid rgba(0,0,0,0.06)" }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: "#6a4a8a", marginBottom: 6 }}>{"\u{1FA91}"} Furniture</div>
          {collectedFurniture.length === 0 && <div style={{ fontSize: 10, color: "#aaa" }}>Find items in levels!</div>}
          {collectedFurniture.map((f, i) => (
            <button key={i} onClick={() => setSelFurn(selFurn === i ? null : i)}
              style={{ width: "100%", padding: 6, marginBottom: 3, background: selFurn === i ? "#ffe0ff" : "#fff", border: selFurn === i ? "2px solid #aa66ff" : "2px solid #eee", borderRadius: 6, cursor: "pointer", textAlign: "left", fontFamily: "inherit", fontSize: 11, display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ fontSize: 16 }}>{f.emoji}</span>
              <span style={{ fontWeight: 600, color: "#444" }}>{f.name}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

const mobileBtn = {
  width: 42, height: 42, borderRadius: "50%",
  background: "rgba(255,255,255,0.3)", border: "2px solid rgba(255,255,255,0.5)",
  color: "#fff", fontSize: 15, cursor: "pointer", display: "flex",
  alignItems: "center", justifyContent: "center", backdropFilter: "blur(4px)",
  touchAction: "none", userSelect: "none", WebkitUserSelect: "none",
};

ReactDOM.render(React.createElement(FloppyExplores), document.getElementById('root'));
</script>
</body>
</html>
